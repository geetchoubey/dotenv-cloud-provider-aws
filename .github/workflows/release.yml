name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: dotenv-cloud-provider-aws

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Cross-compilation helpers for the Linux targets.
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          dir="${BIN_NAME}-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$dir/"
          cp README.md LICENSE-MIT LICENSE-APACHE manifest.toml "$dir/" 2>/dev/null || true
          tar -czf "${dir}.tar.gz" "$dir"
          shasum -a 256 "${dir}.tar.gz" > "${dir}.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "${{ github.event.inputs.tag }}" }
          $dir = "$env:BIN_NAME-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" $dir
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE, manifest.toml $dir -ErrorAction SilentlyContinue
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
          (Get-FileHash "$dir.zip" -Algorithm SHA256).Hash.ToLower() + "  $dir.zip" | Out-File -Encoding ascii "$dir.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-*.tar.gz
            ${{ env.BIN_NAME }}-*.tar.gz.sha256
            ${{ env.BIN_NAME }}-*.zip
            ${{ env.BIN_NAME }}-*.zip.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Fetch the dotenv-cloud core CLI from its public releases; its `sign`
      # subcommand signs our archives with the shared release key.
      - name: Install signer (from core release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --repo geetchoubey/dotenv-cloud --limit 1 --json tagName -q '.[0].tagName')
          echo "using core signer from $tag"
          gh release download "$tag" --repo geetchoubey/dotenv-cloud \
            --pattern 'dotenv-cloud-*-x86_64-unknown-linux-gnu.tar.gz' --dir signer
          tar -xzf signer/*.tar.gz -C signer
          find signer -type f -name dotenv-cloud -exec cp {} ./dotenv-cloud-signer \;
          chmod +x ./dotenv-cloud-signer

      - name: Sign archives
        env:
          DOTENV_CLOUD_SIGNING_KEY: ${{ secrets.DOTENV_CLOUD_SIGNING_KEY }}
        run: |
          if [ -z "$DOTENV_CLOUD_SIGNING_KEY" ]; then
            echo "::error::DOTENV_CLOUD_SIGNING_KEY secret is not set" >&2
            exit 1
          fi
          shopt -s nullglob
          for f in dist/*.tar.gz dist/*.zip; do
            ./dotenv-cloud-signer sign "$f" --out "$f.sig"
            echo "signed $f"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.zip
            dist/*.zip.sha256
            dist/*.zip.sig

      # Push mechanism: tell the core repo to regenerate the registry index now
      # that a new provider version is published. Requires a PAT with
      # contents:write on geetchoubey/dotenv-cloud.
      - name: Trigger registry refresh
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::REGISTRY_DISPATCH_TOKEN not set; skipping registry refresh"
            exit 0
          fi
          gh api repos/geetchoubey/dotenv-cloud/dispatches \
            -f event_type=registry-refresh
          echo "requested registry refresh"
